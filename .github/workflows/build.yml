name: build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure (MSVC, x64)
        run: cmake -B build -A x64

      - name: Build (MinSizeRel)
        run: cmake --build build --config MinSizeRel

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: x-todo
          path: build/MinSizeRel/x-todo.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download exe
        uses: actions/download-artifact@v4
        with:
          name: x-todo
          path: dist

      - name: Publish GitHub Release
        run: gh release create "$GITHUB_REF_NAME" "dist/x-todo.exe#x-todo.exe" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
